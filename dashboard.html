<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: transparent; color: white; font-family: sans-serif; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: #111; border: 1px solid #8A2BE2; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(138, 43, 226, 0.2); }
        h1 { color: #8A2BE2; text-shadow: 0 0 5px #8A2BE2; }
        .value { font-size: 24px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Bem-vindo à NitroRP</h1>
    <div class="stats-grid">
        <div class="card">
            <div>Vendas Hoje</div>
            <div class="value">R$ 1.250,00</div>
        </div>
        <div class="card">
            <div>Jogadores Online</div>
            <div class="value">142</div>
        </div>
        <div class="card">
            <div>Saldo Mizano</div>
            <div class="value">R$ 4.302,50</div>
        </div>
    </div>
</body>
</html>
