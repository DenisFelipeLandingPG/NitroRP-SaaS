<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NitroRP - Dashboard Master</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: #fff; display: flex; height: 100vh; }
        #sidebar { width: 250px; background: #0D0D0D; border-right: 1px solid #8A2BE2; display: flex; flex-direction: column; padding: 20px; }
        #sidebar h2 { color: #8A2BE2; font-size: 22px; margin-bottom: 30px; text-align: center; }
        .menu-item { padding: 15px; cursor: pointer; color: #A0A0A0; text-decoration: none; transition: 0.3s; border-radius: 5px; margin-bottom: 5px; display: block; }
        .menu-item:hover { background: #1a1a1a; color: #8A2BE2; box-shadow: 0 0 10px rgba(138, 43, 226, 0.2); }
        #content { flex: 1; padding: 20px; overflow-y: auto; background: #050505; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>NITRO RP</h2>
    <a class="menu-item" onclick="mudarPagina('dashboard')">🏠 Dashboard</a>
    <a class="menu-item" onclick="mudarPagina('lojas')">🛒 Minhas Lojas</a>
    <a class="menu-item" onclick="mudarPagina('produtos')">📦 Produtos</a>
    <a class="menu-item" onclick="mudarPagina('clientes')">👥 Clientes</a>
    <a class="menu-item" onclick="mudarPagina('financeiro')">💰 Financeiro</a>
    <a class="menu-item" onclick="mudarPagina('integracoes')">⚡ Integrações</a>
</div>

<div id="content">
    <iframe id="janela-principal" src="pages/dashboard.html"></iframe>
</div>

<script>
    function mudarPagina(nome) {
        // Altera o SRC do iframe para carregar o arquivo da sua pasta /pages
        document.getElementById('janela-principal').src = 'pages/' + nome + '.html';
    }
</script>

</body>
</html>
