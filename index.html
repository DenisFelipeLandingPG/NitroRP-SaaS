<script>
    function ir(pagina, elemento) {
        const frame = document.getElementById('tela');
        // Adicionamos um ./ antes de pages para garantir que ele procure na pasta atual
        frame.src = './pages/' + pagina + '.html';

        document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
        elemento.classList.add('active');
    }
    
    // Forçar o carregamento inicial da dashboard ao abrir
    window.onload = function() {
        document.getElementById('tela').src = './pages/dashboard.html';
    };
</script>
