<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NitroRP | Painel Administrativo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Estilizada */
        #sidebar { width: 260px; background: #0a0a0a; border-right: 2px solid #8A2BE2; padding: 30px 20px; display: flex; flex-direction: column; gap: 10px; }
        .logo { color: #8A2BE2; font-weight: bold; font-size: 24px; text-align: center; margin-bottom: 40px; text-shadow: 0 0 10px rgba(138, 43, 226, 0.5); }
        
        .nav-button { 
            padding: 15px; border-radius: 8px; color: #888; text-decoration: none; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 12px; border: 1px solid transparent;
        }
        .nav-button:hover { background: #151515; color: #8A2BE2; border-color: rgba(138, 43, 226, 0.3); box-shadow: 0 0 15px rgba(138, 43, 226, 0.1); }
        .active { background: #151515; color: #8A2BE2; border-color: #8A2BE2; }

        /* Área de Conteúdo */
        #main-content { flex: 1; position: relative; background: #050505; }
        iframe { width: 100%; height: 100%; border: none; background: transparent; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="logo">NITRO RP</div>
    <div class="nav-button active" onclick="ir('dashboard', this)">🏠 Dashboard</div>
    <div class="nav-button" onclick="ir('lojas', this)">🛒 Minhas Lojas</div>
    <div class="nav-button" onclick="ir('produtos', this)">📦 Produtos</div>
    <div class="nav-button" onclick="ir('clientes', this)">👥 Clientes</div>
    <div class="nav-button" onclick="ir('financeiro', this)">💰 Financeiro</div>
    <div class="nav-button" onclick="ir('integracoes', this)">⚡ Integrações</div>
</div>

<div id="main-content">
    <!-- O segredo está aqui: ele começa carregando a dashboard -->
    <iframe id="tela" src="pages/dashboard.html"></iframe>
</div>

<script>
    function ir(pagina, elemento) {
        // Atualiza o link do iframe
        const frame = document.getElementById('tela');
        frame.src = 'pages/' + pagina + '.html';

        // Muda a cor do botão selecionado
        document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
        elemento.classList.add('active');
    }
</script>

</body>
</html>
