<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505; 
            color: white; 
            overflow-x: hidden;
        }
        /* Efeito de Vidro do Google */
        .glass-card { 
            background: rgba(17, 17, 17, 0.7); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.2); 
            border-radius: 16px; 
        }
        .text-purple-bright { color: #A855F7; }
        .bg-purple-glow { background: rgba(138, 43, 226, 0.1); }
    </style>
</head>
<body class="p-8">

    <!-- Header Estilo Google -->
    <div class="flex justify-between items-start mb-10">
        <div>
            <h1 class="text-3xl font-bold tracking-tight">Olá, Administrador!</h1>
            <p class="text-gray-400 mt-1 flex items-center gap-2">
                Seu servidor está online <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            </p>
        </div>
        <div class="flex items-center gap-4">
            <div class="glass-card px-4 py-2 flex items-center gap-3 border-gray-800">
                <span class="text-sm font-medium">Servidor FiveM #1</span>
                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
            <div class="w-10 h-10 rounded-full bg-purple-600 flex items-center justify-center font-bold">A</div>
        </div>
    </div>

    <!-- KPIs Estilo Google -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
        <div class="glass-card p-6">
            <p class="text-gray-400 text-sm font-medium">Total em Vendas (30 dias)</p>
            <div class="flex items-baseline gap-2 mt-3">
                <h2 class="text-3xl font-bold">R$ 4.580,00</h2>
                <span class="text-green-400 text-xs font-bold">+12%</span>
            </div>
        </div>
        <div class="glass-card p-6 border-l-4 border-l-purple-600">
            <p class="text-gray-400 text-sm font-medium">Assinaturas Ativas</p>
            <h2 class="text-3xl font-bold mt-3">142 players</h2>
            <p class="text-gray-500 text-xs mt-1">Recorrência mensal</p>
        </div>
        <div class="glass-card p-6">
            <p class="text-gray-400 text-sm font-medium">Novas Vendas (Hoje)</p>
            <h2 class="text-3xl font-bold mt-3">18 itens</h2>
        </div>
        <div class="glass-card p-6">
            <p class="text-gray-400 text-sm font-medium">Ticket Médio</p>
            <h2 class="text-3xl font-bold mt-3">R$ 45,00</h2>
        </div>
    </div>

    <!-- Gráficos -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 glass-card p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Desempenho de Vendas</h3>
                <span class="text-purple-bright text-sm cursor-pointer hover:underline">Ver detalhes</span>
            </div>
            <canvas id="vendasChart" style="max-height: 350px;"></canvas>
        </div>
        
        <div class="glass-card p-8 flex flex-col items-center">
            <h3 class="text-xl font-bold mb-8 w-full">Produtos Mais Vendidos</h3>
            <div class="relative w-full aspect-square">
                <canvas id="produtosChart"></canvas>
            </div>
            <button class="w-full mt-8 py-3 bg-purple-600 hover:bg-purple-700 rounded-xl font-bold transition">Sacar Saldo</button>
        </div>
    </div>

    <script>
        const ctxVendas = document.getElementById('vendasChart').getContext('2d');
        const gradient = ctxVendas.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(138, 43, 226, 0.4)');
        gradient.addColorStop(1, 'rgba(138, 43, 226, 0)');

        new Chart(ctxVendas, {
            type: 'line',
            data: {
                labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'],
                datasets: [{
                    data: [350, 650, 420, 880, 690, 1200, 950],
                    borderColor: '#A855F7',
                    borderWidth: 4,
                    pointBackgroundColor: '#A855F7',
                    fill: true,
                    backgroundColor: gradient,
                    tension: 0.4
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { 
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#666' } },
                    x: { grid: { display: false }, ticks: { color: '#666' } }
                }
            }
        });

        const ctxProd = document.getElementById('produtosChart').getContext('2d');
        new Chart(ctxProd, {
            type: 'doughnut',
            data: {
                labels: ['VIP Ouro', 'VIP Diamante', 'Outros'],
                datasets: [{
                    data: [45, 35, 20],
                    backgroundColor: ['#7C3AED', '#4C1D95', '#1F2937'],
                    hoverOffset: 4,
                    borderWidth: 0
                }]
            },
            options: {
                cutout: '80%',
                plugins: { legend: { position: 'bottom', labels: { color: '#999', padding: 20, usePointStyle: true } } }
            }
        });
    </script>
</body>
</html>
